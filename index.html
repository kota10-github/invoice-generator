<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>請求書作成ツール</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500;600;700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Noto Sans JP', sans-serif;
    background: #eef1f5;
    color: #333;
    min-height: 100vh;
  }

  /* ===== EDITOR PANEL ===== */
  .app-container {
    display: flex;
    gap: 0;
    min-height: 100vh;
  }

  .editor-panel {
    width: 420px;
    min-width: 420px;
    background: #ffffff;
    color: #333;
    padding: 24px;
    overflow-y: auto;
    height: 100vh;
    position: sticky;
    top: 0;
    border-right: 1px solid #e0e0e0;
  }

  .editor-panel h1 {
    font-size: 20px;
    font-weight: 700;
    margin-bottom: 6px;
    color: #1a1a2e;
    letter-spacing: 1px;
  }

  .editor-panel .subtitle {
    font-size: 12px;
    color: #999;
    margin-bottom: 24px;
  }

  .section-title {
    font-size: 13px;
    font-weight: 600;
    color: #2c5f7c;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    margin-bottom: 12px;
    margin-top: 20px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .section-title::before {
    content: '';
    display: inline-block;
    width: 3px;
    height: 14px;
    background: #2c5f7c;
    border-radius: 2px;
  }

  .form-row {
    display: flex;
    gap: 10px;
    margin-bottom: 10px;
  }

  .form-group {
    margin-bottom: 10px;
    flex: 1;
  }

  .form-group label {
    display: block;
    font-size: 11px;
    color: #888;
    margin-bottom: 4px;
    font-weight: 500;
  }

  .req {
    color: #d94032;
    font-size: 10px;
    font-weight: 600;
  }

  .opt {
    color: #aaa;
    font-size: 9px;
    font-weight: 400;
    border: 1px solid #d0d5dd;
    border-radius: 3px;
    padding: 0 4px;
    margin-left: 2px;
  }

  .form-group input, .form-group select, .form-group textarea {
    width: 100%;
    padding: 8px 12px;
    border: 1px solid #d0d5dd;
    border-radius: 6px;
    background: #f9fafb;
    color: #333;
    font-size: 13px;
    font-family: 'Noto Sans JP', sans-serif;
    transition: border-color 0.2s;
  }

  .form-group input:focus, .form-group select:focus, .form-group textarea:focus {
    outline: none;
    border-color: #2c5f7c;
    background: #fff;
  }

  .form-group textarea {
    resize: vertical;
    min-height: 50px;
  }

  /* Items editor */
  .item-card {
    background: #f9fafb;
    border: 1px solid #d0d5dd;
    border-radius: 8px;
    padding: 12px;
    margin-bottom: 8px;
    position: relative;
  }

  .item-card .item-row {
    display: flex;
    gap: 8px;
    align-items: end;
  }

  .item-card .form-group { margin-bottom: 6px; }

  .btn-remove-item {
    position: absolute;
    top: 8px;
    right: 8px;
    background: none;
    border: none;
    color: #e74c3c;
    cursor: pointer;
    font-size: 16px;
    line-height: 1;
    opacity: 0.6;
    transition: opacity 0.2s;
  }

  .btn-remove-item:hover { opacity: 1; }

  .btn-add-item {
    width: 100%;
    padding: 10px;
    border: 2px dashed #d0d5dd;
    border-radius: 8px;
    background: transparent;
    color: #2c5f7c;
    font-size: 13px;
    cursor: pointer;
    font-family: 'Noto Sans JP', sans-serif;
    transition: all 0.2s;
    margin-bottom: 12px;
  }

  .btn-add-item:hover {
    border-color: #2c5f7c;
    background: rgba(44, 95, 124, 0.04);
  }

  .btn-pdf {
    width: 100%;
    padding: 14px;
    background: linear-gradient(135deg, #2c5f7c, #3a7ca5);
    color: #fff;
    border: none;
    border-radius: 8px;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    font-family: 'Noto Sans JP', sans-serif;
    transition: all 0.2s;
    margin-top: 16px;
    letter-spacing: 1px;
  }

  .btn-pdf:hover {
    background: linear-gradient(135deg, #3a7ca5, #4a9cc5);
    transform: translateY(-1px);
    box-shadow: 0 4px 12px rgba(58, 124, 165, 0.3);
  }

  .btn-pdf:active {
    transform: translateY(0);
  }

  .color-picker-row {
    display: flex;
    gap: 8px;
    align-items: center;
    margin-bottom: 12px;
  }

  .color-swatch {
    width: 28px;
    height: 28px;
    border-radius: 6px;
    border: 2px solid transparent;
    cursor: pointer;
    transition: all 0.2s;
  }

  .color-swatch:hover, .color-swatch.active {
    border-color: #333;
    transform: scale(1.15);
  }

  /* ===== PREVIEW PANEL ===== */
  .preview-panel {
    flex: 1;
    padding: 40px;
    display: flex;
    flex-direction: column;
    align-items: center;
    overflow-y: auto;
  }

  .zoom-controls {
    display: flex;
    align-items: center;
    gap: 6px;
    margin-bottom: 16px;
    position: sticky;
    top: 0;
    z-index: 10;
    background: #eef1f5;
    padding: 8px 16px;
    border-radius: 8px;
    box-shadow: 0 1px 4px rgba(0,0,0,0.06);
  }

  .btn-zoom {
    width: 32px;
    height: 32px;
    border: 1px solid #d0d5dd;
    border-radius: 6px;
    background: #fff;
    color: #333;
    font-size: 16px;
    cursor: pointer;
    font-family: 'Noto Sans JP', sans-serif;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.15s;
  }

  .btn-zoom:hover { background: #f0f0f0; }

  .zoom-label {
    font-size: 12px;
    color: #555;
    min-width: 40px;
    text-align: center;
    font-weight: 600;
  }

  /* ===== INVOICE ===== */
  .invoice-page {
    width: 794px; /* A4 = 210mm ≈ 794px at 96dpi */
    height: 1123px; /* A4 = 297mm ≈ 1123px at 96dpi */
    background: #fff;
    padding: 30px 48px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.12);
    position: relative;
    color: #333;
    overflow: hidden;
    font-weight: 600;
  }

  .invoice-accent-line {
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 4px;
  }

  .invoice-header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    margin-top: 8px;
    margin-bottom: 14px;
  }

  .invoice-title {
    font-size: 22px;
    font-weight: 700;
    letter-spacing: 10px;
    color: #333;
  }

  .invoice-meta {
    text-align: right;
    font-size: 13px;
    line-height: 1.6;
    color: #333;
  }

  .invoice-meta table {
    margin-left: auto;
    border-collapse: collapse;
  }

  .invoice-meta td {
    padding: 1px 0;
  }

  .invoice-meta .meta-label {
    font-weight: 400;
    color: #666;
    text-align: right;
    padding-right: 4px;
    white-space: nowrap;
  }

  .invoice-meta .meta-colon {
    font-weight: 400;
    color: #666;
    text-align: center;
    width: 16px;
  }

  .invoice-meta .meta-value {
    font-weight: 600;
    color: #333;
    text-align: left;
    padding-left: 4px;
    white-space: nowrap;
  }

  .client-section {
    margin-bottom: 16px;
    padding-bottom: 10px;
    border-bottom: 1px solid #e0e0e0;
  }

  .client-name {
    font-size: 20px;
    font-weight: 700;
    margin-bottom: 4px;
  }

  .client-honorific {
    font-size: 15px;
    color: #666;
  }

  .invoice-greeting {
    font-size: 14px;
    color: #333;
    margin-bottom: 14px;
  }

  /* Total amount box */
  .total-box {
    border-radius: 6px;
    padding: 12px 24px;
    margin-bottom: 18px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: #fff !important;
    border: 2px solid;
  }

  .total-box-label {
    font-size: 12px;
    font-weight: 600;
    opacity: 0.9;
  }

  .total-box-amount {
    font-size: 28px;
    font-weight: 700;
    letter-spacing: 1.5px;
  }

  /* Issuer + Bank info */
  .info-columns {
    display: flex;
    gap: 28px;
    margin-bottom: 16px;
  }

  .info-col {
    flex: 1;
  }

  .info-col.issuer-col {
    flex: 1.4;
  }

  .issuer-col .info-item table {
    margin-left: 12px;
  }

  .info-col-title {
    font-size: 12px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    padding-bottom: 4px;
    margin-bottom: 8px;
    border-bottom: 2px solid;
    color: #555;
  }

  .info-item {
    font-size: 13px;
    line-height: 1.5;
    color: #333;
    font-weight: 400;
  }

  .info-item strong {
    color: #333;
    font-weight: 700;
    font-size: 14px;
  }

  .info-item table {
    border-collapse: collapse;
    font-size: 11px;
  }

  .info-item table td {
    padding: 1px 0;
    vertical-align: top;
  }

  .info-item .il {
    font-weight: 700;
    color: #333;
    white-space: nowrap;
    padding-right: 2px;
    text-align: right;
  }

  .info-item .ic {
    font-weight: 400;
    color: #888;
    text-align: center;
    width: 14px;
  }

  .info-item .iv {
    font-weight: 400;
    color: #555;
    padding-left: 4px;
  }

  /* Table */
  .invoice-table {
    width: 100%;
    border-collapse: collapse;
    margin-bottom: 16px;
    font-size: 13px;
  }

  .invoice-table thead th {
    color: #fff;
    padding: 7px 10px;
    text-align: left;
    font-weight: 700;
    font-size: 11px;
    letter-spacing: 0.5px;
  }

  .invoice-table thead th:nth-child(n+2) {
    text-align: right;
  }

  .invoice-table tbody td {
    padding: 8px 10px;
    border-bottom: 1px solid #eee;
  }

  .invoice-table tbody td:nth-child(n+2) {
    text-align: right;
    white-space: nowrap;
    font-variant-numeric: tabular-nums;
  }

  .invoice-table tbody tr:nth-child(even) {
    background: #f8f9fb;
  }

  /* Summary */
  .summary-section {
    display: flex;
    justify-content: flex-end;
    margin-bottom: 18px;
  }

  .summary-table {
    border-collapse: collapse;
    font-size: 13px;
  }

  .summary-table td {
    padding: 5px 10px;
  }

  .summary-table .s-label {
    font-weight: 400;
    color: #666;
    text-align: left;
    white-space: nowrap;
  }

  .summary-table .s-value {
    font-weight: 600;
    color: #333;
    text-align: right;
    font-variant-numeric: tabular-nums;
    white-space: nowrap;
    min-width: 120px;
  }

  .summary-table .s-border {
    border-bottom: 1px solid #eee;
  }

  .summary-table .total-row td {
    font-weight: 700;
    font-size: 15px;
    padding: 8px 10px;
  }

  .summary-table .total-row td:first-child {
    border-radius: 6px 0 0 6px;
  }

  .summary-table .total-row td:last-child {
    border-radius: 0 6px 6px 0;
  }

  .summary-table .total-row .s-value {
    font-weight: 700;
  }

  /* Bank info box */
  .bank-box {
    border: 1px solid #ddd;
    border-radius: 6px;
    padding: 12px 16px;
    margin-bottom: 20px;
    font-size: 13px;
    line-height: 1.5;
    color: #555;
  }

  .bank-box-title {
    font-weight: 700;
    color: #333;
    margin-bottom: 4px;
    font-size: 13px;
  }

  .bank-note {
    font-size: 10px;
    color: #999;
    margin-bottom: 6px;
  }

  /* Footer — removed */

  /* Responsive hint */
  @media (max-width: 1300px) {
    .app-container { flex-direction: column; }
    .editor-panel {
      width: 100%;
      min-width: auto;
      height: auto;
      position: static;
    }
    .preview-panel { padding: 20px; overflow-x: auto; }
  }

  /* Saving indicator */
  .saving-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.5);
    z-index: 1000;
    justify-content: center;
    align-items: center;
  }

  .saving-overlay.active { display: flex; }

  .saving-spinner {
    background: #fff;
    padding: 32px 48px;
    border-radius: 12px;
    text-align: center;
    font-size: 15px;
    color: #333;
  }

  .saving-spinner::before {
    content: '';
    display: block;
    width: 40px;
    height: 40px;
    margin: 0 auto 16px;
    border: 3px solid #e0e0e0;
    border-top-color: #3a7ca5;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  /* ===== LOGIN SCREEN ===== */
  .login-screen {
    position: fixed;
    inset: 0;
    background: #eef1f5;
    z-index: 2000;
    display: flex;
    justify-content: center;
    align-items: center;
  }

  .login-screen.hidden { display: none; }

  .login-card {
    background: #fff;
    border-radius: 12px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.10);
    padding: 40px 44px;
    width: 380px;
    text-align: center;
  }

  .login-card h2 {
    font-size: 20px;
    font-weight: 700;
    color: #1a1a2e;
    margin-bottom: 6px;
    letter-spacing: 1px;
  }

  .login-card .login-sub {
    font-size: 12px;
    color: #999;
    margin-bottom: 28px;
  }

  .login-card input[type="email"] {
    width: 100%;
    padding: 12px 14px;
    border: 1px solid #d0d5dd;
    border-radius: 8px;
    font-size: 14px;
    font-family: 'Noto Sans JP', sans-serif;
    background: #f9fafb;
    color: #333;
    transition: border-color 0.2s;
  }

  .login-card input[type="email"]:focus {
    outline: none;
    border-color: #2c5f7c;
    background: #fff;
  }

  .login-card .login-hint {
    font-size: 11px;
    color: #aaa;
    margin-top: 8px;
    text-align: left;
  }

  .btn-login {
    width: 100%;
    padding: 13px;
    margin-top: 20px;
    background: linear-gradient(135deg, #2c5f7c, #3a7ca5);
    color: #fff;
    border: none;
    border-radius: 8px;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    font-family: 'Noto Sans JP', sans-serif;
    transition: all 0.2s;
    letter-spacing: 1px;
  }

  .btn-login:hover {
    background: linear-gradient(135deg, #3a7ca5, #4a9cc5);
    transform: translateY(-1px);
    box-shadow: 0 4px 12px rgba(58, 124, 165, 0.3);
  }

  .btn-login:disabled {
    opacity: 0.5;
    cursor: not-allowed;
    transform: none;
    box-shadow: none;
  }

  /* ===== USER BAR ===== */
  .user-bar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: #f0f4f8;
    border: 1px solid #e0e0e0;
    border-radius: 8px;
    padding: 8px 14px;
    margin-bottom: 20px;
  }

  .user-bar-email {
    font-size: 12px;
    color: #555;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    max-width: 200px;
  }

  .user-bar-actions {
    display: flex;
    gap: 6px;
  }

  .btn-small {
    padding: 5px 12px;
    border: 1px solid #d0d5dd;
    border-radius: 5px;
    background: #fff;
    color: #333;
    font-size: 11px;
    cursor: pointer;
    font-family: 'Noto Sans JP', sans-serif;
    transition: all 0.15s;
    white-space: nowrap;
  }

  .btn-small:hover {
    background: #f0f0f0;
    border-color: #bbb;
  }

  .btn-small.primary {
    background: #2c5f7c;
    color: #fff;
    border-color: #2c5f7c;
  }

  .btn-small.primary:hover {
    background: #3a7ca5;
  }

  .save-toast {
    position: fixed;
    top: 20px;
    right: 20px;
    background: #2c5f7c;
    color: #fff;
    padding: 12px 24px;
    border-radius: 8px;
    font-size: 13px;
    z-index: 3000;
    opacity: 0;
    transform: translateY(-10px);
    transition: all 0.3s;
    pointer-events: none;
  }

  .save-toast.show {
    opacity: 1;
    transform: translateY(0);
  }
</style>
</head>
<body>

<!-- ===== LOGIN SCREEN ===== -->
<div class="login-screen" id="loginScreen">
  <div class="login-card">
    <h2>請求書作成ツール</h2>
    <p class="login-sub">メールアドレスでログインしてください</p>
    <input type="email" id="loginEmail" placeholder="example@company.com" autocomplete="email">
    <p class="login-hint">入力した情報はこのメールアドレスに紐づけて保存されます</p>
    <button class="btn-login" id="btnLogin" disabled>ログイン</button>
  </div>
</div>

<!-- ===== TOAST ===== -->
<div class="save-toast" id="saveToast">保存しました</div>

<div class="app-container">
  <!-- ===== LEFT: EDITOR ===== -->
  <div class="editor-panel">
    <h1>請求書作成ツール</h1>
    <p class="subtitle">Invoice Generator</p>

    <!-- User bar (shown after login) -->
    <div class="user-bar" id="userBar" style="display:none">
      <span class="user-bar-email" id="userBarEmail"></span>
      <div class="user-bar-actions">
        <button class="btn-small primary" onclick="saveProfile()">保存</button>
        <button class="btn-small" onclick="logout()">ログアウト</button>
      </div>
    </div>

    <div class="section-title">テーマカラー</div>
    <div class="color-picker-row" id="colorPicker">
      <div class="color-swatch active" style="background:#2c5f7c" data-color="#2c5f7c"></div>
      <div class="color-swatch" style="background:#1a5c3a" data-color="#1a5c3a"></div>
      <div class="color-swatch" style="background:#7c2c2c" data-color="#7c2c2c"></div>
      <div class="color-swatch" style="background:#5c3a7c" data-color="#5c3a7c"></div>
      <div class="color-swatch" style="background:#333333" data-color="#333333"></div>
    </div>

    <div class="section-title">請求情報</div>
    <div class="form-group">
      <label>請求日 <span class="req">※</span></label>
      <input type="date" id="invoiceDate">
    </div>
    <input type="hidden" id="invoiceNumber">
    <input type="hidden" id="invoiceSeq">

    <div class="section-title">請求先</div>
    <div class="form-group">
      <label>種別 <span class="req">※</span></label>
      <select id="clientType">
        <option value="company">法人</option>
        <option value="individual">個人</option>
      </select>
    </div>
    <div class="form-group">
      <label id="clientNameLabel">会社名 <span class="req">※</span></label>
      <input type="text" id="clientName" placeholder="株式会社〇〇">
    </div>

    <div class="section-title">発行元</div>
    <div class="form-group">
      <label>種別 <span class="req">※</span></label>
      <select id="issuerType">
        <option value="company">法人</option>
        <option value="individual">個人</option>
      </select>
    </div>
    <div class="form-group">
      <label id="issuerNameLabel">会社名 <span class="req">※</span></label>
      <input type="text" id="issuerName" placeholder="合同会社△△">
    </div>
    <div class="form-group">
      <label>登録番号 <span class="opt">任意</span></label>
      <input type="text" id="issuerRegNo" placeholder="T0000000000000">
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>郵便番号</label>
        <input type="text" id="issuerZip" placeholder="000-0000">
      </div>
      <div class="form-group">
        <label>電話番号</label>
        <input type="text" id="issuerPhone" placeholder="000-0000-0000">
      </div>
    </div>
    <div class="form-group">
      <label>住所 <span class="req">※</span></label>
      <textarea id="issuerAddress" rows="2" placeholder="東京都千代田区千代田1-1&#10;〇〇ビル 3F"></textarea>
    </div>
    <div class="form-group">
      <label>メール</label>
      <input type="text" id="issuerEmail" placeholder="info@example.com">
    </div>

    <div class="section-title">振込先</div>
    <div class="form-row">
      <div class="form-group">
        <label>鉠行名 <span class="req">※</span></label>
        <input type="text" id="bankName" placeholder="三菱UFJ銀行">
      </div>
      <div class="form-group">
        <label>支店名 <span class="req">※</span></label>
        <input type="text" id="bankBranch" placeholder="〇〇支店">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group">
        <label>口座種別 <span class="req">※</span></label>
        <select id="bankType">
          <option value="普通">普通</option>
          <option value="当座">当座</option>
        </select>
      </div>
      <div class="form-group">
        <label>口座番号 <span class="req">※</span></label>
        <input type="text" id="bankAccount" placeholder="0000000">
      </div>
    </div>
    <div class="form-group">
      <label>口座名義 <span class="req">※</span></label>
      <input type="text" id="bankHolder" placeholder="カ）〇〇〇〇">
    </div>

    <div class="section-title">消費税</div>
    <div class="form-row">
      <div class="form-group">
        <label>税区分 <span class="req">※</span></label>
        <select id="taxMode">
          <option value="exclusive">外税（税抜価格で入力）</option>
          <option value="inclusive">内税（税込価格で入力）</option>
        </select>
      </div>
      <div class="form-group">
        <label>税率 <span class="req">※</span></label>
        <select id="taxRate">
          <option value="0.10">10%</option>
          <option value="0.08">8%（軽減税率）</option>
          <option value="0">非課税</option>
        </select>
      </div>
    </div>


    <div class="section-title">品目</div>
    <div id="itemsContainer"></div>
    <button class="btn-add-item" onclick="addItem()">＋ 品目を追加</button>

    <div class="section-title">備考</div>
    <div class="form-group">
      <label>備考欄 <span class="opt">任意</span></label>
      <textarea id="notes" placeholder="お振込み手数料は貴社にてご負担ください"></textarea>
    </div>

    <button class="btn-pdf" onclick="exportPDF()">PDF をダウンロード</button>
  </div>

  <!-- ===== RIGHT: PREVIEW ===== -->
  <div class="preview-panel">
    <div class="zoom-controls" id="zoomControls">
      <button class="btn-zoom" onclick="setZoom(-0.1)">−</button>
      <span class="zoom-label" id="zoomLabel">100%</span>
      <button class="btn-zoom" onclick="setZoom(0.1)">＋</button>
      <button class="btn-zoom" onclick="resetZoom()" style="margin-left:8px; font-size:10px;">リセット</button>
    </div>
    <div class="invoice-page" id="invoicePreview">
      <div class="invoice-accent-line" id="accentLine" style="background: linear-gradient(90deg, #2c5f7c, #4a9cc5);"></div>

      <div class="invoice-header">
        <div class="invoice-title">請　求　書</div>
        <div class="invoice-meta" id="metaArea">
          <table>
            <tr><td class="meta-label">請求日</td><td class="meta-colon">：</td><td class="meta-value" id="pDate">2026/03/26</td></tr>
            <tr><td class="meta-label">請求番号</td><td class="meta-colon">：</td><td class="meta-value" id="pNumber">INV-260326-001</td></tr>
            <tr id="pRegNoLine" style="display:none"><td class="meta-label">登録番号</td><td class="meta-colon">：</td><td class="meta-value" id="pRegNo"></td></tr>
          </table>
        </div>
      </div>

      <div class="client-section">
        <div class="client-name"><span id="pClient">株式会社〇〇</span>　<span class="client-honorific" id="pHonorific">御中</span></div>
      </div>

      <div class="invoice-greeting">下記のとおりご請求申し上げます。</div>

      <div class="total-box" id="totalBox" style="border-color: #2c5f7c; color: #2c5f7c;">
        <div class="total-box-label">ご請求金額（税込）</div>
        <div class="total-box-amount" id="pGrandTotal">¥0</div>
      </div>

      <div class="info-columns">
        <div class="info-col issuer-col">
          <div class="info-col-title" id="issuerTitle" style="border-color: #2c5f7c;">発行元</div>
          <div class="info-item" id="pIssuerInfo"></div>
        </div>
        <div class="info-col">
          <div class="info-col-title" id="bankTitle" style="border-color: #2c5f7c;">お振込先</div>
          <div class="info-item" id="pBankInfo"></div>
        </div>
      </div>

      <table class="invoice-table">
        <thead>
          <tr id="tableHead" style="background: #2c5f7c;">
            <th style="width:50%">品　名</th>
            <th style="width:10%">数量</th>
            <th style="width:20%" id="thPrice">単価（税抜）</th>
            <th style="width:0%" id="thTax" style="display:none">消費税</th>
            <th style="width:20%" id="thTotal">金額（税抜）</th>
          </tr>
        </thead>
        <tbody id="pTableBody"></tbody>
      </table>

      <div class="summary-section">
        <table class="summary-table">
          <tr class="s-border">
            <td class="s-label" id="pSubtotalLabel">小計（税抜）</td>
            <td class="s-value" id="pSubtotal">¥0</td>
          </tr>
          <tr class="s-border">
            <td class="s-label" id="pTaxLabel">消費税（10%）</td>
            <td class="s-value" id="pTax">¥0</td>
          </tr>
          <tr class="total-row" id="summaryTotal" style="background: rgba(44,95,124,0.08); color: #2c5f7c;">
            <td class="s-label" id="pTotalLabel">合計（税込）</td>
            <td class="s-value" id="pTotal">¥0</td>
          </tr>
        </table>
      </div>

      <div class="bank-box" id="bankBox" style="display:none;">
        <div class="bank-note" id="pNotes"></div>
      </div>

      <!-- footer removed -->
    </div>
  </div>
</div>

<div class="saving-overlay" id="savingOverlay">
  <div class="saving-spinner">PDFを生成中...</div>
</div>

<script>
  // ===== STATE =====
  let accentColor = '#2c5f7c';
  let items = [{ name: '', quantity: 1, price: 0 }];
  let currentUserEmail = null;

  // ===== HASH (メールアドレスからストレージキーを生成、他人のデータを見れないようにする) =====
  async function hashEmail(email) {
    const normalized = email.trim().toLowerCase();
    const encoder = new TextEncoder();
    const data = encoder.encode('inv_tool_salt_2026_' + normalized);
    const hashBuffer = await crypto.subtle.digest('SHA-256', data);
    const hashArray = Array.from(new Uint8Array(hashBuffer));
    return 'inv_' + hashArray.map(b => b.toString(16).padStart(2, '0')).join('').slice(0, 32);
  }

  // ===== LOGIN =====
  function setupLogin() {
    const emailInput = document.getElementById('loginEmail');
    const btnLogin = document.getElementById('btnLogin');

    emailInput.addEventListener('input', () => {
      btnLogin.disabled = !emailInput.value.match(/^[^\s@]+@[^\s@]+\.[^\s@]+$/);
    });

    emailInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !btnLogin.disabled) doLogin();
    });

    btnLogin.addEventListener('click', doLogin);

    // 前回のセッションを復元
    const lastEmail = sessionStorage.getItem('inv_current_user');
    if (lastEmail) {
      emailInput.value = lastEmail;
      btnLogin.disabled = false;
      doLogin();
    }
  }

  async function doLogin() {
    const email = document.getElementById('loginEmail').value.trim();
    if (!email) return;
    currentUserEmail = email;
    sessionStorage.setItem('inv_current_user', email);

    document.getElementById('loginScreen').classList.add('hidden');
    document.getElementById('userBar').style.display = 'flex';
    document.getElementById('userBarEmail').textContent = email;

    await loadProfile();
    init();
  }

  function logout() {
    currentUserEmail = null;
    sessionStorage.removeItem('inv_current_user');
    // フォームをリセット
    items = [{ name: '', quantity: 1, price: 0 }];
    accentColor = '#2c5f7c';
    document.getElementById('loginScreen').classList.remove('hidden');
    document.getElementById('loginEmail').value = '';
    document.getElementById('btnLogin').disabled = true;
    document.getElementById('userBar').style.display = 'none';
  }

  // ===== PROFILE SAVE / LOAD =====
  const profileFields = ['clientType','clientName','issuerType','issuerName','issuerRegNo','issuerZip','issuerPhone','issuerAddress','issuerEmail','bankName','bankBranch','bankType','bankAccount','bankHolder','taxMode','taxRate','notes'];

  async function saveProfile() {
    if (!currentUserEmail) return;
    const key = await hashEmail(currentUserEmail);
    const data = {};
    profileFields.forEach(id => {
      data[id] = document.getElementById(id).value;
    });
    data.items = items;
    data.accentColor = accentColor;
    localStorage.setItem(key, JSON.stringify(data));
    showToast('保存しました');
  }

  async function loadProfile() {
    if (!currentUserEmail) return;
    const key = await hashEmail(currentUserEmail);
    const raw = localStorage.getItem(key);
    if (!raw) return;
    try {
      const data = JSON.parse(raw);
      profileFields.forEach(id => {
        if (data[id] !== undefined) {
          document.getElementById(id).value = data[id];
        }
      });
      if (data.items && data.items.length > 0) {
        items = data.items;
      }
      if (data.accentColor) {
        accentColor = data.accentColor;
        document.querySelectorAll('.color-swatch').forEach(s => {
          s.classList.toggle('active', s.dataset.color === accentColor);
        });
        applyColor();
      }
    } catch(e) { /* ignore corrupt data */ }
  }

  function showToast(msg) {
    const toast = document.getElementById('saveToast');
    toast.textContent = msg;
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 2000);
  }

  function buildInvoiceNumber() {
    const dateStr = document.getElementById('invoiceDate').value;
    const seq = document.getElementById('invoiceSeq').value || '001';
    const parts = dateStr.split('-');
    if (parts.length !== 3) return '';
    const yy = parts[0].slice(2);
    const mm = parts[1];
    const dd = parts[2];
    return `INV-${yy}${mm}${dd}-${seq}`;
  }

  // ===== INIT =====
  function init() {
    const today = new Date();
    document.getElementById('invoiceDate').value = today.toISOString().split('T')[0];
    const seq = String(Math.floor(Math.random() * 999) + 1).padStart(3, '0');
    document.getElementById('invoiceSeq').value = seq;
    document.getElementById('invoiceNumber').value = buildInvoiceNumber();

    // 請求日変更時に請求番号を再生成
    document.getElementById('invoiceDate').addEventListener('change', function() {
      document.getElementById('invoiceNumber').value = buildInvoiceNumber();
      render();
    });

    // Color swatches
    document.querySelectorAll('.color-swatch').forEach(el => {
      el.addEventListener('click', () => {
        document.querySelectorAll('.color-swatch').forEach(s => s.classList.remove('active'));
        el.classList.add('active');
        accentColor = el.dataset.color;
        applyColor();
        render();
      });
    });

    // Bind inputs
    const ids = ['invoiceDate','invoiceNumber','clientType','clientName','issuerType','issuerName','issuerRegNo','issuerZip','issuerPhone','issuerAddress','issuerEmail','bankName','bankBranch','bankType','bankAccount','bankHolder','taxMode','taxRate','notes'];
    ids.forEach(id => {
      document.getElementById(id).addEventListener('input', render);
      document.getElementById(id).addEventListener('change', render);
    });

    renderItems();
    render();
  }

  // ===== COLOR =====
  function applyColor() {
    document.getElementById('accentLine').style.background = `linear-gradient(90deg, ${accentColor}, ${lighten(accentColor, 30)})`;
    document.getElementById('totalBox').style.borderColor = accentColor;
    document.getElementById('totalBox').style.color = accentColor;
    document.getElementById('tableHead').style.background = accentColor;
    document.getElementById('issuerTitle').style.borderColor = accentColor;
    document.getElementById('bankTitle').style.borderColor = accentColor;
    document.getElementById('summaryTotal').style.background = hexToRgba(accentColor, 0.08);
    document.getElementById('summaryTotal').style.color = accentColor;
  }

  function lighten(hex, amt) {
    let r = parseInt(hex.slice(1,3), 16);
    let g = parseInt(hex.slice(3,5), 16);
    let b = parseInt(hex.slice(5,7), 16);
    r = Math.min(255, r + amt);
    g = Math.min(255, g + amt);
    b = Math.min(255, b + amt);
    return `#${r.toString(16).padStart(2,'0')}${g.toString(16).padStart(2,'0')}${b.toString(16).padStart(2,'0')}`;
  }

  function hexToRgba(hex, alpha) {
    const r = parseInt(hex.slice(1,3), 16);
    const g = parseInt(hex.slice(3,5), 16);
    const b = parseInt(hex.slice(5,7), 16);
    return `rgba(${r},${g},${b},${alpha})`;
  }

  // ===== ITEMS =====
  function renderItems() {
    const container = document.getElementById('itemsContainer');
    const isIncl = document.getElementById('taxMode').value === 'inclusive';
    const priceLabel = isIncl ? '単価（税込）' : '単価（税抜）';
    container.innerHTML = '';
    items.forEach((item, i) => {
      const card = document.createElement('div');
      card.className = 'item-card';
      card.innerHTML = `
        ${items.length > 1 ? `<button class="btn-remove-item" onclick="removeItem(${i})">✕</button>` : ''}
        <div class="form-group">
          <label>品名 <span class="req">※</span></label>
          <input type="text" value="${esc(item.name)}" placeholder="コンテンツ制作費" oninput="updateItem(${i},'name',this.value)">
        </div>
        <div class="item-row">
          <div class="form-group" style="flex:0.4">
            <label>数量 <span class="req">※</span></label>
            <input type="number" min="1" value="${item.quantity}" oninput="updateItem(${i},'quantity',this.value)">
          </div>
          <div class="form-group">
            <label>${priceLabel} <span class="req">※</span></label>
            <input type="number" min="0" value="${item.price}" oninput="updateItem(${i},'price',this.value)">
          </div>
        </div>
      `;
      container.appendChild(card);
    });
  }

  function addItem() {
    items.push({ name: '', quantity: 1, price: 0 });
    renderItems();
    render();
  }

  function removeItem(i) {
    items.splice(i, 1);
    renderItems();
    render();
  }

  function updateItem(i, key, val) {
    if (key === 'quantity' || key === 'price') {
      items[i][key] = parseFloat(val) || 0;
    } else {
      items[i][key] = val;
    }
    render();
  }

  // ===== RENDER =====
  let lastTaxMode = null;
  function render() {
    const v = id => document.getElementById(id).value;
    const taxRate = parseFloat(v('taxRate'));

    // 内税/外税が変わったら品目ラベルを再描画
    const curTaxMode = v('taxMode');
    if (curTaxMode !== lastTaxMode) {
      lastTaxMode = curTaxMode;
      renderItems();
    }

    // Meta
    const dateStr = v('invoiceDate').replace(/-/g, '/');
    document.getElementById('pDate').textContent = dateStr;
    const invNum = buildInvoiceNumber();
    document.getElementById('invoiceNumber').value = invNum;
    document.getElementById('pNumber').textContent = invNum;
    const regNo = v('issuerRegNo');
    const regNoLine = document.getElementById('pRegNoLine');
    if (regNo) {
      regNoLine.style.display = 'table-row';
      document.getElementById('pRegNo').textContent = regNo;
    } else {
      regNoLine.style.display = 'none';
    }

    // Client
    const isCompany = v('clientType') === 'company';
    document.getElementById('clientNameLabel').innerHTML = (isCompany ? '会社名' : '氏名') + ' <span class="req">※</span>';
    document.getElementById('clientName').placeholder = isCompany ? '株式会社〇〇' : '山田 太郎';
    document.getElementById('pClient').textContent = v('clientName') || (isCompany ? '（請求先会社名）' : '（請求先氏名）');
    document.getElementById('pHonorific').textContent = isCompany ? '御中' : '様';

    // Issuer type
    const issuerIsCompany = v('issuerType') === 'company';
    document.getElementById('issuerNameLabel').innerHTML = (issuerIsCompany ? '会社名' : '氏名') + ' <span class="req">※</span>';
    document.getElementById('issuerName').placeholder = issuerIsCompany ? '合同会社△△' : '山田 太郎';

    // Issuer info
    let issuerHtml = '';
    if (v('issuerName')) issuerHtml += `<strong>${esc(v('issuerName'))}</strong>`;
    let issuerRows = '';
    if (v('issuerZip')) issuerRows += `<tr><td class="il">郵便番号</td><td class="ic">：</td><td class="iv">〒${esc(v('issuerZip'))}</td></tr>`;
      if (v('issuerAddress')) {
        const addrHtml = esc(v('issuerAddress')).replace(/\n/g, '<br>');
        issuerRows += `<tr><td class="il">住所</td><td class="ic">：</td><td class="iv">${addrHtml}</td></tr>`;
      }
    if (v('issuerPhone')) issuerRows += `<tr><td class="il">電話番号</td><td class="ic">：</td><td class="iv">${esc(v('issuerPhone'))}</td></tr>`;
    if (v('issuerEmail')) issuerRows += `<tr><td class="il">メール</td><td class="ic">：</td><td class="iv">${esc(v('issuerEmail'))}</td></tr>`;
    if (issuerRows) issuerHtml += `<table>${issuerRows}</table>`;
    document.getElementById('pIssuerInfo').innerHTML = issuerHtml;

    // Bank info
    let bankRows = '';
    if (v('bankName')) bankRows += `<tr><td class="il">銀行名</td><td class="ic">：</td><td class="iv">${esc(v('bankName'))}</td></tr>`;
    if (v('bankBranch')) bankRows += `<tr><td class="il">支店名</td><td class="ic">：</td><td class="iv">${esc(v('bankBranch'))}</td></tr>`;
    if (v('bankType')) bankRows += `<tr><td class="il">口座種別</td><td class="ic">：</td><td class="iv">${esc(v('bankType'))}</td></tr>`;
    if (v('bankAccount')) bankRows += `<tr><td class="il">口座番号</td><td class="ic">：</td><td class="iv">${esc(v('bankAccount'))}</td></tr>`;
    if (v('bankHolder')) bankRows += `<tr><td class="il">名義</td><td class="ic">：</td><td class="iv">${esc(v('bankHolder'))}</td></tr>`;
    document.getElementById('pBankInfo').innerHTML = bankRows ? `<table>${bankRows}</table>` : '';

    // Tax mode
    const isInclusive = v('taxMode') === 'inclusive';
    const taxPct = taxRate === 0.10 ? '10%' : taxRate === 0.08 ? '8%' : '0%';

    // Table headers by tax mode
    const thTax = document.getElementById('thTax');
    if (isInclusive) {
      document.getElementById('thPrice').textContent = '単価（税抜）';
      thTax.style.display = 'none';
      document.getElementById('thTotal').textContent = '金額（税抜）';
    } else {
      document.getElementById('thPrice').textContent = '単価（税抜）';
      thTax.style.display = 'none';
      document.getElementById('thTotal').textContent = '金額（税抜）';
    }

    // Table
    let subtotalExTax = 0;
    let totalTax = 0;
    let subtotalIncTax = 0;
    const tbody = document.getElementById('pTableBody');
    tbody.innerHTML = '';
    items.forEach(item => {
      const lineInput = item.quantity * item.price;
      let lineExTax, lineTax, lineIncTax;

      if (isInclusive) {
        // 内税: 入力値は税込 → 税抜・税額を逆算
        lineIncTax = lineInput;
        lineExTax = Math.floor(lineInput / (1 + taxRate));
        lineTax = lineIncTax - lineExTax;
      } else {
        // 外税: 入力値は税抜 → 税額を加算
        lineExTax = lineInput;
        lineTax = Math.floor(lineInput * taxRate);
        lineIncTax = lineExTax + lineTax;
      }
      subtotalExTax += lineExTax;
      totalTax += lineTax;
      subtotalIncTax += lineIncTax;

      const tr = document.createElement('tr');
      // 内税の場合: priceは税込入力値なので税抜単価を逆算表示
      const displayPrice = isInclusive ? Math.floor(item.price / (1 + taxRate)) : item.price;
      tr.innerHTML = `
        <td>${esc(item.name) || '—'}</td>
        <td>${fmt(item.quantity)}</td>
        <td>${fmtYen(displayPrice)}</td>
        <td>${fmtYen(lineExTax)}</td>
      `;
      tbody.appendChild(tr);
    });

    const grandTotal = subtotalExTax + totalTax;

    // Summary labels & values
    if (isInclusive) {
      document.getElementById('pSubtotalLabel').textContent = '小計（税抜）';
      document.getElementById('pSubtotal').textContent = fmtYen(subtotalExTax);
      document.getElementById('pTaxLabel').textContent = `消費税（${taxPct}）`;
      document.getElementById('pTax').textContent = fmtYen(totalTax);
      document.getElementById('pTotalLabel').textContent = '合計（税込）';
      document.getElementById('pTotal').textContent = fmtYen(grandTotal);
    } else {
      document.getElementById('pSubtotalLabel').textContent = '小計（税抜）';
      document.getElementById('pSubtotal').textContent = fmtYen(subtotalExTax);
      document.getElementById('pTaxLabel').textContent = `消費税（${taxPct}）`;
      document.getElementById('pTax').textContent = fmtYen(totalTax);
      document.getElementById('pTotalLabel').textContent = '合計（税込）';
      document.getElementById('pTotal').textContent = fmtYen(grandTotal);
    }
    document.getElementById('pGrandTotal').textContent = `¥${fmt(grandTotal)}`;

    // Notes
    const notes = v('notes');
    const bankBox = document.getElementById('bankBox');
    if (notes) {
      bankBox.style.display = 'block';
      document.getElementById('pNotes').textContent = notes;
    } else {
      bankBox.style.display = 'none';
    }

  }

  // ===== FORMATTING =====
  function fmt(n) {
    return Number(n).toLocaleString('ja-JP');
  }

  function fmtYen(n) {
    return `¥${Number(n).toLocaleString('ja-JP')}`;
  }

  function esc(s) {
    const d = document.createElement('div');
    d.textContent = s;
    return d.innerHTML;
  }

  // ===== ZOOM =====
  let currentZoom = 1.0;

  function setZoom(delta) {
    currentZoom = Math.max(0.3, Math.min(2.0, currentZoom + delta));
    applyZoom();
  }

  function resetZoom() {
    currentZoom = 1.0;
    applyZoom();
  }

  function applyZoom() {
    const page = document.getElementById('invoicePreview');
    page.style.transform = `scale(${currentZoom})`;
    page.style.transformOrigin = 'top center';
    document.getElementById('zoomLabel').textContent = Math.round(currentZoom * 100) + '%';
  }

  // ===== PDF EXPORT =====
  function exportPDF() {
    // PDF出力時にプロフィールも自動保存
    saveProfile();

    const overlay = document.getElementById('savingOverlay');
    overlay.classList.add('active');

    const el = document.getElementById('invoicePreview');

    // ズームをリセットして出力、完了後に戻す
    const prevZoom = currentZoom;
    currentZoom = 1.0;
    el.style.transform = 'scale(1)';
    el.style.transformOrigin = 'top center';

    // ファイル名: 請求書_(相手名)_(品目)_(発行者名)
    const clientName = document.getElementById('clientName').value || '請求先';
    const issuerName = document.getElementById('issuerName').value || '発行元';
    const firstItem = items[0] && items[0].name ? items[0].name : '品目';
    const filename = `請求書_${clientName}_${firstItem}_${issuerName}.pdf`;

    const opt = {
      margin: 0,
      filename: filename,
      image: { type: 'jpeg', quality: 0.98 },
      html2canvas: {
        scale: 2,
        useCORS: true,
        letterRendering: true,
        width: 794,
        height: 1123
      },
      jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' },
      pagebreak: { mode: ['avoid-all'] }
    };

    html2pdf().set(opt).from(el).save().then(() => {
      overlay.classList.remove('active');
      currentZoom = prevZoom;
      applyZoom();
    }).catch(() => {
      overlay.classList.remove('active');
      currentZoom = prevZoom;
      applyZoom();
      alert('PDF生成中にエラーが発生しました。');
    });
  }

  // ===== START =====
  setupLogin();
</script>

</body>
</html>
